<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>금액대별 재건축아파트리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── 로그인 화면 ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 320px;
    }

    #login-screen h1 { font-size: 1.6rem; letter-spacing: 2px; }
    #login-screen p  { color: #aaa; font-size: 0.9rem; }

    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    #login-screen input:focus { border-color: #888; }

    #login-screen button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #e4405f;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen button:hover { background: #c0392b; }

    #error-msg {
      color: #ff6b6b;
      font-size: 0.85rem;
      display: none;
    }

    /* ── 갤러리 화면 ── */
    #gallery-screen { display: none; width: 100%; padding: 24px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
    }
    header h1 { font-size: 1.4rem; }

    #logout-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #555;
      background: transparent;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #logout-btn:hover { background: #333; }

    /* 사진 업로드 영역 */
    #upload-area {
      max-width: 1100px;
      margin: 0 auto 28px;
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #upload-area:hover, #upload-area.drag-over { border-color: #e4405f; }
    #upload-area p { color: #888; font-size: 0.9rem; margin-top: 8px; }
    #file-input { display: none; }

    /* 그리드 */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .photo-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1;
      background: #222;
      cursor: pointer;
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .photo-card:hover img { transform: scale(1.05); }
    .photo-card .del-btn {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .photo-card:hover .del-btn { display: flex; }

    #empty-msg {
      color: #555;
      text-align: center;
      grid-column: 1/-1;
      padding: 48px 0;
      font-size: 0.95rem;
    }

    /* 라이트박스 */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }
    #lightbox-close {
      position: absolute;
      top: 20px; right: 28px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <h1>🔒 금액대별 재건축아파트리스트</h1>
  <p>비밀번호를 입력하세요</p>
  <div style="position:relative; width:100%;">
    <input type="password" id="pw-input" placeholder="비밀번호" style="width:100%; padding-right:44px;" />
    <button onclick="togglePw()" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.2rem; color:#aaa;">👁</button>
  </div>
  <button onclick="checkPassword()">입장</button>
  <span id="error-msg">비밀번호가 틀렸습니다.</span>
</div>

<!-- 갤러리 화면 -->
<div id="gallery-screen">
  <header>
    <h1>📷 나의 갤러리</h1>
    <button id="logout-btn" onclick="logout()">로그아웃</button>
  </header>

  <div id="upload-area" onclick="document.getElementById('file-input').click()">
    <div style="font-size:2.5rem">📁</div>
    <p>클릭하거나 사진을 여기로 드래그해서 업로드</p>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)" />
  </div>

  <div id="grid">
    <p id="empty-msg">아직 사진이 없습니다. 사진을 업로드해 보세요!</p>
  </div>
</div>

<!-- 라이트박스 -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  // ─── 비밀번호 (SHA-256 해시) ───────────────────────────────────────
  // "happy"의 SHA-256: 2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824
  const CORRECT_HASH = "489f719cadf919094ddb38e7654de153ac33c02febb5de91e5345cbe372cf4a0";

  function togglePw() {
    const input = document.getElementById('pw-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function checkPassword() {
    const pw = document.getElementById('pw-input').value;
    const hash = await sha256(pw);
    if (hash === CORRECT_HASH) {
      sessionStorage.setItem('auth', '1');
      showGallery();
    } else {
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  // ─── 화면 전환 ─────────────────────────────────────────────────────
  function showGallery() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('gallery-screen').style.display = 'block';
    renderGrid();
  }

  function logout() {
    sessionStorage.removeItem('auth');
    location.reload();
  }

  // 세션 유지
  if (sessionStorage.getItem('auth') === '1') showGallery();

  // ─── 사진 저장 (localStorage) ──────────────────────────────────────
  function getPhotos() {
    return JSON.parse(localStorage.getItem('gallery_photos') || '[]');
  }
  function savePhotos(photos) {
    localStorage.setItem('gallery_photos', JSON.stringify(photos));
  }

  // ─── 업로드 ────────────────────────────────────────────────────────
  function handleFiles(files) {
    const photos = getPhotos();
    let loaded = 0;
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        photos.push({ id: Date.now() + Math.random(), src: e.target.result, name: file.name });
        loaded++;
        if (loaded === files.length) { savePhotos(photos); renderGrid(); }
      };
      reader.readAsDataURL(file);
    });
  }

  // 드래그 앤 드롭
  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  // ─── 그리드 렌더링 ─────────────────────────────────────────────────
  function renderGrid() {
    const photos = getPhotos();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    if (photos.length === 0) {
      grid.innerHTML = '<p id="empty-msg">아직 사진이 없습니다. 사진을 업로드해 보세요!</p>';
      return;
    }
    photos.forEach(photo => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.innerHTML = `
        <img src="${photo.src}" alt="${photo.name}" onclick="openLightbox('${photo.id}')" />
        <button class="del-btn" onclick="deletePhoto('${photo.id}')">✕</button>
      `;
      grid.appendChild(card);
    });
  }

  function deletePhoto(id) {
    const photos = getPhotos().filter(p => String(p.id) !== String(id));
    savePhotos(photos);
    renderGrid();
  }

  // ─── 라이트박스 ────────────────────────────────────────────────────
  function openLightbox(id) {
    const photo = getPhotos().find(p => String(p.id) === String(id));
    if (!photo) return;
    document.getElementById('lightbox-img').src = photo.src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });
</script>
</body>
</html>

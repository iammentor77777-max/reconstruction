<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>금액대별 재건축아파트리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 로그인 화면 */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 320px;
    }

    #login-screen h1 { font-size: 1.4rem; text-align: center; line-height: 1.4; }
    #login-screen p  { color: #aaa; font-size: 0.9rem; }

    #login-screen input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    #login-screen input:focus { border-color: #888; }

    #login-screen button.enter-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #e4405f;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen button.enter-btn:hover { background: #c0392b; }

    #error-msg {
      color: #ff6b6b;
      font-size: 0.85rem;
      display: none;
    }

    /* 콘텐츠 화면 */
    #content-screen {
      display: none;
      width: 100%;
      padding: 24px;
      flex-direction: column;
      align-items: center;
    }

    #content-screen header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 900px;
      margin-bottom: 24px;
    }

    #content-screen header h1 { font-size: 1.3rem; }

    #logout-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #555;
      background: transparent;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #logout-btn:hover { background: #333; }

    #content-screen img {
      max-width: 900px;
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <h1>🔒 금액대별<br>재건축아파트리스트</h1>
  <p>비밀번호를 입력하세요</p>
  <div style="position:relative; width:100%;">
    <input type="password" id="pw-input" placeholder="비밀번호" />
    <span onclick="togglePw()" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.1rem; user-select:none;">👁</span>
  </div>
  <button class="enter-btn" onclick="checkPassword()">입장</button>
  <span id="error-msg">비밀번호가 틀렸습니다.</span>
</div>

<!-- 콘텐츠 화면 -->
<div id="content-screen">
  <header>
    <h1>금액대별 재건축아파트리스트</h1>
    <button id="logout-btn" onclick="logout()">로그아웃</button>
  </header>
  <img src="금액별 재건축 리스트.png" alt="금액대별 재건축아파트리스트" />
</div>

<script>
  const CORRECT_HASH = "489f719cadf919094ddb38e7654de153ac33c02febb5de91e5345cbe372cf4a0";

  function togglePw() {
    const input = document.getElementById('pw-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function checkPassword() {
    const pw = document.getElementById('pw-input').value;
    const hash = await sha256(pw);
    if (hash === CORRECT_HASH) {
      sessionStorage.setItem('auth', '1');
      showContent();
    } else {
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function showContent() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('content-screen').style.display = 'flex';
  }

  function logout() {
    sessionStorage.removeItem('auth');
    location.reload();
  }

  if (sessionStorage.getItem('auth') === '1') showContent();
</script>
</body>
</html>
